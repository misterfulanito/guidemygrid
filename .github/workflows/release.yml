name: Release

# Disabled — releases are published instantly from local machine
# via `npm run publish:patch` which uses the gh CLI directly.
# This workflow is kept as a fallback only.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npm run package

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/GuideMyGrid-v*.ccx
            releases/GuideMyGrid-v*-installer.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
