# Source: 02-RESEARCH.md's `## CI Job Design (WIN-05 Rescoped)` — built and
# inspected the .ccx locally; Expand-Archive extension-check gotcha per
# github.com/actions/runner#1883 discussion.
name: Windows CCX Verification

on:
  push:
    branches: [ main, epic/ui-icons ]
  pull_request:
  workflow_dispatch:

jobs:
  verify-windows-ccx:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package .ccx
        run: npm run package:ccx

      - name: Extract .ccx and validate contents
        shell: pwsh
        run: |
          $ccx = Get-ChildItem -Path "releases" -Filter "*.ccx" | Select-Object -First 1
          if (-not $ccx) { throw "No .ccx artifact found in releases/ after packaging" }

          $extractDir = "ccx-extracted"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($ccx.FullName, $extractDir)

          $manifestPath = Join-Path $extractDir "dist/manifest.json"
          if (-not (Test-Path $manifestPath)) {
            throw "manifest.json not found at expected path dist/manifest.json inside the .ccx"
          }
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json

          $rp = $manifest.requiredPermissions
          $okScope = $false
          if ($null -ne $rp) {
            $rpKeys = @($rp.PSObject.Properties.Name)
            $net = $rp.network
            $netKeys = if ($net) { @($net.PSObject.Properties.Name) } else { @() }
            $domains = if ($net) { @($net.domains) } else { @() }
            if ($rpKeys.Count -eq 1 -and $rpKeys[0] -eq "network") {
              if ($netKeys.Count -eq 1 -and $netKeys[0] -eq "domains") {
                if ($domains.Count -eq 1 -and $domains[0] -eq "https://api.github.com") {
                  $okScope = $true
                }
              }
            }
          }

          if ($null -eq $rp -or $okScope) {
            Write-Host "OK: manifest.json requiredPermissions is absent or scoped to the reviewed api.github.com-only tradeoff (Phase 4 D-01/D-03)"
          } else {
            $found = $rp | ConvertTo-Json -Compress -Depth 10
            throw "manifest.json declares requiredPermissions broader than the reviewed api.github.com-only scope (Phase 4 D-01/D-03) -- found: $found. This widens Creative Cloud Desktop admin-password-prompt trigger beyond what was reviewed."
          }

          $retiredNames = @("install.bat", "install.ps1", "install.sh", "uninstall.bat", "uninstall.ps1")
          foreach ($name in $retiredNames) {
            $found = Get-ChildItem -Path $extractDir -Recurse -Filter $name -ErrorAction SilentlyContinue
            if ($found) {
              throw "Retired raw-copy script '$name' found inside the built .ccx -- should have been deleted per Phase 2's D-03"
            }
          }
          Write-Host "OK: no retired raw-copy installer scripts found in the .ccx"
