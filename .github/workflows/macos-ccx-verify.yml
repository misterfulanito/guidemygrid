# Source: 02-RESEARCH.md's `## CI Job Design (WIN-05 Rescoped)`, mirrored for
# macOS per Phase 3's D-09/D-10 — build the .ccx the way a real release does,
# then assert its contents have no requiredPermissions and no retired
# installer/uninstaller scripts. Uses `unzip` (macOS built-in) + `node -e` for
# JSON parsing instead of a `jq` dependency the project doesn't otherwise use.
name: macOS CCX Verification

on:
  push:
    branches: [ main, epic/ui-icons ]
  pull_request:
  workflow_dispatch:

jobs:
  verify-macos-ccx:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package .ccx
        run: npm run package:ccx

      - name: Extract .ccx and validate contents
        run: |
          set -euo pipefail

          CCX=$(ls releases/*.ccx 2>/dev/null | head -n1 || true)
          if [ -z "$CCX" ]; then
            echo "No .ccx artifact found in releases/ after packaging"
            exit 1
          fi

          mkdir -p ccx-extracted
          unzip -q "$CCX" -d ccx-extracted

          MANIFEST="ccx-extracted/dist/manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "manifest.json not found at expected path dist/manifest.json inside the .ccx"
            exit 1
          fi

          node -e '
            const rp = require(process.argv[1]).requiredPermissions;
            const okScope = !!rp
              && typeof rp === "object"
              && Object.keys(rp).length === 1
              && rp.network
              && typeof rp.network === "object"
              && Object.keys(rp.network).length === 1
              && Array.isArray(rp.network.domains)
              && rp.network.domains.length === 1
              && rp.network.domains[0] === "https://api.github.com";
            if (!rp || okScope) {
              console.log("OK: manifest.json requiredPermissions is absent or scoped to the reviewed api.github.com-only tradeoff (Phase 4 D-01/D-03)");
              process.exit(0);
            }
            console.error("manifest.json declares requiredPermissions broader than the reviewed api.github.com-only scope (Phase 4 D-01/D-03) -- found: " + JSON.stringify(rp) + ". This widens Creative Cloud Desktop admin-password-prompt trigger beyond what was reviewed.");
            process.exit(1);
          ' "$PWD/$MANIFEST"

          RETIRED_NAMES="install.bat install.ps1 install.sh uninstall.bat uninstall.ps1 build-mac-uninstaller.js uninstall-preinstall"
          for name in $RETIRED_NAMES; do
            if find ccx-extracted -name "$name" | grep -q .; then
              echo "Retired installer/uninstaller script '$name' found inside the built .ccx -- should have been deleted per Phase 2's D-03 / Phase 3's D-01"
              exit 1
            fi
          done
          echo "OK: no retired installer/uninstaller scripts found in the .ccx"
